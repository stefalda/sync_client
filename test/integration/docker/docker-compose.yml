services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgress
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 2s
      timeout: 5s
      retries: 15
    ports:
      - "5433:5432"
    volumes:
      - ./database_postgres_script.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs: /var/lib/postgresql/data

  server:
    image: sfalda/sync_server:latest
    platform: linux/amd64
    restart: always
    container_name: sync-server
    environment:
      - RATE_LIMIT_DISABLE=1
    ports:
      - '8076:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/app/dist/config.json
      - /tmp/sync-logs:/app/dist/logs
      - /tmp/sync-uploads:/app/dist/temp_uploads

  sqlitewrapperserver:
    image: sfalda/sqlite_wrapper_server:latest
    platform: linux/amd64
    tmpfs: /data
    environment:
      SECRET_KEY: "41666b6b-c045-4cc2-aa09-67ba0cb8d55c"
      UNAUTHENTICATED: true
      SHARED_DB: true

  envoy:
    image: envoyproxy/envoy:v1.33-latest
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "50052:50052"

  sqlitewrapperserver-auth:
    image: sfalda/sqlite_wrapper_server:latest
    platform: linux/amd64
    tmpfs: /data
    environment:
      SECRET_KEY: "41666b6b-c045-4cc2-aa09-67ba0cb8d55c"
      SHARED_DB: true

  envoy-auth:
    image: envoyproxy/envoy:v1.33-latest
    volumes:
      - ./envoy-auth.yaml:/etc/envoy/envoy.yaml
    ports:
      - "50054:50054"
