name: Dart

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
    branches: [ "master" ]

jobs:
  test-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze project source
        run: dart analyze

      - name: Run unit and DB tests
        run: flutter test --exclude-tags integration

  test-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Start Docker services
        run: |
          cd test/integration/docker
          docker compose up -d
          # Wait for server to be healthy
          for i in $(seq 1 30); do
            if curl -s http://localhost:8076 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: flutter test --tags integration

      - name: Stop Docker services
        if: always()
        run: |
          cd test/integration/docker
          docker compose down
