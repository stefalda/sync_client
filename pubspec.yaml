version: 1.3.4-beta
homepage: https://github.com/stefalda/sync_client
issue_tracker: https://github.com/stefalda/sync_client/issues

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqlite_wrapper:
    ^0.3.8-beta
    #path: ./../../open-source/sqlite_wrapper
  sqlite3: ^3.1.1
  uuid: ^4.5.2
  crypto: ^3.0.7
  encrypt: ^5.0.3
  dio: ^5.9.0

dev_dependencies:
  flutter_lints: ^6.0.0
  lints: ^6.0.0
  test: ^1.28.0
